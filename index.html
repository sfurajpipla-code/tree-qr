<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tree Scanner Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--primary); }
        
        /* Scanner Window */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px; }
        
        .info-box { background: #e8f5e9; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .label-text { font-size: 0.8rem; color: #666; text-transform: uppercase; font-weight: bold; }
        .value-text { display: block; font-size: 1.1rem; font-weight: bold; min-height: 1.2em; }

        label { display: block; margin: 10px 0 5px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        
        .btn-scan { background: #333; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--primary); color: white; margin-top: 10px; }
        .btn-sync { background: var(--secondary); color: white; margin-top: 20px; }
        
        .status-footer { text-align: center; font-size: 0.8rem; color: #777; margin-top: 15px; }
        .badge { background: #ff5252; color: white; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Scanner</h2>
        <div id="reader"></div>
        <button id="scanBtn" class="btn-scan" onclick="toggleScanner()">START CAMERA</button>
    </div>

    <div class="card">
        <h2>2. Tree Details</h2>
        <div class="info-box">
            <span class="label-text">Unique Tree ID</span>
            <span id="displayUid" class="value-text">Not Scanned</span>
        </div>

        <label>Height (M)</label>
        <input type="number" id="height" inputmode="decimal" placeholder="0.00">

        <label>Girth (CM)</label>
        <input type="number" id="girth" inputmode="decimal" placeholder="00.0">

        <button class="btn-save" onclick="saveToPhone()">SAVE TO PHONE (OFFLINE)</button>
    </div>

    <div class="card" style="border-top: 4px solid var(--secondary);">
        <div class="status-footer">
            Pending Sync: <span id="count" class="badge">0</span>
        </div>
        <button class="btn-sync" onclick="syncToGoogle()">SYNC TO GOOGLE SHEETS</button>
    </div>

    <script>
        let html5QrCode;
        let currentUid = "";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6Wq08OfuYrZ2kWdT7iwSflwUvfgzjucEQSnzjd-R0l7r9qUFzWfT_39CSN4jPrhkg/exec"; // REPLACE THIS!

        // --- SCANNER LOGIC ---
        function toggleScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // Handle both URL-based QR and plain text QR
                try {
                    const url = new URL(decodedText);
                    currentUid = url.searchParams.get("uid") || decodedText;
                } catch(e) {
                    currentUid = decodedText;
                }

                document.getElementById('displayUid').innerText = currentUid.replace(/_/g, " ");
                html5QrCode.stop(); // Stop camera to save battery
                alert("Scanned Successfully!");
            }).catch(err => {
                alert("Camera Error: " + err);
            });
        }

        // --- OFFLINE STORAGE ---
        function saveToPhone() {
            const h = document.getElementById('height').value;
            const g = document.getElementById('girth').value;

            if (!currentUid || !h || !g) {
                alert("Please scan tree and enter both measurements!");
                return;
            }

            const record = {
                uid: currentUid,
                height: h,
                girth: g,
                time: new Date().toLocaleString()
            };

            let storage = JSON.parse(localStorage.getItem('treeData') || "[]");
            storage.push(record);
            localStorage.setItem('treeData', JSON.stringify(storage));

            // UI Reset
            alert("Saved locally! Ready for next tree.");
            document.getElementById('height').value = "";
            document.getElementById('girth').value = "";
            document.getElementById('displayUid').innerText = "Not Scanned";
            currentUid = "";
            updateCount();
        }

        function updateCount() {
            const storage = JSON.parse(localStorage.getItem('treeData') || "[]");
            document.getElementById('count').innerText = storage.length;
        }

        // --- SYNC TO GOOGLE ---
        async function syncToGoogle() {
            const storage = JSON.parse(localStorage.getItem('treeData') || "[]");
            if (storage.length === 0) { alert("No data to sync."); return; }
            if (SCRIPT_URL.includes("YOUR_GOOGLE")) { alert("Error: App Script URL not set!"); return; }

            if (!confirm(`Sync ${storage.length} records now?`)) return;

            try {
                // Send as plain text to bypass CORS issues with Apps Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(storage)
                });

                alert("Sync Successful! Local memory cleared.");
                localStorage.setItem('treeData', "[]");
                updateCount();
            } catch (e) {
                alert("Sync failed. Check internet connection.");
            }
        }

        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('Offline Engine Active'));
            });
        }

        // Initial check
        updateCount();
    </script>
</body>
</html>
